<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TripVest — chat</title>
<script src="/config.js"></script>
<style>
  :root {
    --bg: #fafaf9;
    --fg: #18181b;
    --muted: #71717a;
    --accent: #0f766e;
    --bubble-user: #0f766e;
    --bubble-bot: #ffffff;
    --border: #e4e4e7;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    display: flex; flex-direction: column; height: 100dvh;
  }
  header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; background: #fff;
  }
  header a { color: inherit; text-decoration: none; }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header span.tag { color: var(--muted); font-size: 13px; margin-left: auto; }
  #log {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .msg { max-width: 86%; padding: 10px 14px; border-radius: 16px; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: var(--bubble-user); color: #fff; border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: var(--bubble-bot); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.bot.thinking { color: var(--muted); font-style: italic; }
  .msg.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
  form {
    display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border);
    background: #fff; padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
  input {
    flex: 1; padding: 12px 14px; border: 1px solid var(--border);
    border-radius: 999px; font-size: 16px; background: #fff; color: var(--fg);
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    padding: 0 18px; border: 0; border-radius: 999px;
    background: var(--accent); color: #fff; font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <h1><a href="/">✈️ TripVest</a></h1>
  <span class="tag">sandbox demo</span>
</header>
<main id="log" aria-live="polite"></main>
<form id="form">
  <input id="input" placeholder="Type a message…" autocomplete="off" />
  <button id="send" type="submit">Send</button>
</form>
<script>
  var apiOverride = new URLSearchParams(location.search).get("api");
  var API = (apiOverride || window.TRIPVEST_API).replace(/\/$/, "");

  var log = document.getElementById("log");
  var form = document.getElementById("form");
  var input = document.getElementById("input");
  var send = document.getElementById("send");
  var history = [];
  var threadId = null;

  function addBubble(role, text, extraClass) {
    var el = document.createElement("div");
    el.className = "msg " + role + (extraClass ? " " + extraClass : "");
    el.textContent = text;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
    return el;
  }

  async function sendMessage(message) {
    addBubble("user", message);
    history.push({ role: "user", content: message });
    var thinking = addBubble("bot", "thinking…", "thinking");
    send.disabled = true; input.disabled = true;
    try {
      var r = await fetch(API + "/api/chat/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: message,
          history: history.slice(0, -1),
          thread_id: threadId,
        }),
      });
      var data = await r.json();
      thinking.remove();
      if (!r.ok) {
        addBubble("bot", data.error || "Server error", "error");
        return;
      }
      threadId = data.thread_id || threadId;
      addBubble("bot", data.reply || "(no reply)");
      history.push({ role: "assistant", content: data.reply || "" });
    } catch (e) {
      thinking.remove();
      addBubble("bot", "Network error: " + e.message + " (is the backend awake?)", "error");
    } finally {
      send.disabled = false; input.disabled = false;
      input.focus();
    }
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var v = input.value.trim();
    if (!v) return;
    input.value = "";
    sendMessage(v);
  });

  // Auto-greet: send "Hi" as the user's first message on load.
  window.addEventListener("load", function () { sendMessage("Hi"); });
</script>
</body>
</html>
