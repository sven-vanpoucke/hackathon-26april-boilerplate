<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TripVest — chat</title>
<script src="/config.js"></script>
<style>
  :root {
    --bg: #fafaf9;
    --fg: #18181b;
    --muted: #71717a;
    --accent: #0f766e;
    --bubble-user: #0f766e;
    --bubble-bot: #ffffff;
    --border: #e4e4e7;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font: 16px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    display: flex; flex-direction: column; height: 100dvh;
  }
  header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; background: #fff;
  }
  header a { color: inherit; text-decoration: none; }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header span.tag { color: var(--muted); font-size: 13px; margin-left: auto; }
  #log {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .msg { max-width: 86%; padding: 10px 14px; border-radius: 16px; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: var(--bubble-user); color: #fff; border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: var(--bubble-bot); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.bot.thinking { color: var(--muted); font-style: italic; }
  .msg.bot p { margin: 0; }
  .msg.bot p + p { margin-top: 8px; }
  .msg.bot p + ul, .msg.bot ul + p { margin-top: 8px; }
  .msg.bot ul { margin: 0; padding-left: 22px; }
  .msg.bot li { margin: 2px 0; }
  .msg.bot strong { font-weight: 600; color: var(--fg); }
  .msg.bot em { font-style: italic; }
  .msg.bot code { background: var(--bg); padding: 1px 6px; border-radius: 4px; font-size: 0.9em; font-family: ui-monospace, SFMono-Regular, "SF Mono", monospace; }
  .msg.bot a { color: var(--accent); text-decoration: underline; word-break: break-all; }
  .msg.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
  form {
    display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border);
    background: #fff; padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
  input {
    flex: 1; padding: 12px 14px; border: 1px solid var(--border);
    border-radius: 999px; font-size: 16px; background: #fff; color: var(--fg);
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    padding: 0 18px; border: 0; border-radius: 999px;
    background: var(--accent); color: #fff; font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <h1><a href="/">✈️ TripVest</a></h1>
  <span class="tag">sandbox demo</span>
</header>
<main id="log" aria-live="polite"></main>
<form id="form">
  <input id="input" placeholder="Type a message…" autocomplete="off" />
  <button id="send" type="submit">Send</button>
</form>
<script>
  var apiOverride = new URLSearchParams(location.search).get("api");
  var API = (apiOverride || window.TRIPVEST_API).replace(/\/$/, "");

  var log = document.getElementById("log");
  var form = document.getElementById("form");
  var input = document.getElementById("input");
  var send = document.getElementById("send");
  var history = [];
  var threadId = null;

  // Shared chat state with index.html (sessionStorage survives navigation in same tab).
  var STORAGE_KEY = "tripvest:chat";
  function saveState() {
    try {
      sessionStorage.setItem(STORAGE_KEY, JSON.stringify({ threadId: threadId, history: history }));
    } catch (e) {}
  }
  function hydrateState() {
    try {
      var raw = sessionStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      var data = JSON.parse(raw);
      if (!data || !Array.isArray(data.history) || !data.history.length) return false;
      history = data.history.slice();
      threadId = data.threadId || null;
      history.forEach(function (m) {
        addBubble(m.role === "assistant" ? "bot" : "user", m.content || "");
      });
      return true;
    } catch (e) { return false; }
  }

  function renderMarkdown(text) {
    function escape(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function inline(s) {
      s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
      s = s.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g, '$1<em>$2</em>');
      s = s.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
      return s;
    }
    return escape(text).split(/\n\n+/).map(function (block) {
      block = block.replace(/^\s+|\s+$/g, '');
      if (!block) return '';
      var html = '', paraBuf = [], listBuf = [];
      function flushPara() {
        if (paraBuf.length) {
          html += '<p>' + paraBuf.map(inline).join('<br>') + '</p>';
          paraBuf = [];
        }
      }
      function flushList() {
        if (listBuf.length) {
          html += '<ul>' + listBuf.map(function (l) { return '<li>' + inline(l) + '</li>'; }).join('') + '</ul>';
          listBuf = [];
        }
      }
      block.split('\n').forEach(function (line) {
        var bm = line.match(/^\s*[-•]\s+(.*)$/);
        if (bm) { flushPara(); listBuf.push(bm[1]); }
        else { flushList(); paraBuf.push(line); }
      });
      flushPara();
      flushList();
      return html;
    }).join('');
  }

  function addBubble(role, text, extraClass) {
    var el = document.createElement("div");
    el.className = "msg " + role + (extraClass ? " " + extraClass : "");
    if (role === "bot" && !extraClass) {
      el.innerHTML = renderMarkdown(text);
    } else {
      el.textContent = text;
    }
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
    return el;
  }

  async function sendMessage(message) {
    addBubble("user", message);
    history.push({ role: "user", content: message });
    var thinking = addBubble("bot", "thinking…", "thinking");
    send.disabled = true; input.disabled = true;
    try {
      var r = await fetch(API + "/api/chat/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: message,
          history: history.slice(0, -1),
          thread_id: threadId,
        }),
      });
      var data = await r.json();
      thinking.remove();
      if (!r.ok) {
        addBubble("bot", data.error || "Server error", "error");
        return;
      }
      threadId = data.thread_id || threadId;
      addBubble("bot", data.reply || "(no reply)");
      history.push({ role: "assistant", content: data.reply || "" });
    } catch (e) {
      thinking.remove();
      addBubble("bot", "Network error: " + e.message + " (is the backend awake?)", "error");
    } finally {
      send.disabled = false; input.disabled = false;
      input.focus();
      saveState();
    }
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var v = input.value.trim();
    if (!v) return;
    input.value = "";
    sendMessage(v);
  });

  // Auto-greet: pass through trip context if landing handed it off via URL.
  function buildGreeting() {
    var params = new URLSearchParams(location.search);
    var trip = (params.get("trip") || "").trim();
    var costRaw = parseInt(params.get("cost") || "", 10);
    var costStr = costRaw > 0 ? "€" + costRaw.toLocaleString("en-US") : "";
    if (trip && costStr) {
      return "Hi! I'm thinking about " + trip + " in 2036, around " + costStr + ". How do I get there for half the price?";
    }
    if (costStr) {
      return "Hi! I'm planning a 2036 trip, around " + costStr + ". How do I get it for half the price?";
    }
    if (trip) {
      return "Hi! I'm thinking about " + trip + " in 2036. How do I get there for half the price?";
    }
    return "Hi! Give me more info — how do I get my trip in 10 years for half the price?";
  }
  window.addEventListener("load", function () {
    if (hydrateState()) return; // resumed an in-progress chat from the landing page
    sendMessage(buildGreeting());
  });
</script>
</body>
</html>
